            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStockEntry"
      responses:
        "200":
          description: Updated stock entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockEntry"
    delete:
      operationId: deleteStockEntry
      tags: [stockEntries]
      summary: Delete a stock entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /sales-entries:
    get:
      operationId: listSalesEntries
      tags: [salesEntries]
      summary: List sales entries
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of sales entries
          content:
            application/json:
              schema:
                type: array
                items:
