components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Supplier:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        contactName:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - name
        - createdAt

    CreateSupplier:
      type: object
      properties:
        name:
          type: string
        contactName:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
      required:
        - name

    Ingredient:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        unit:
          type: string
        packWeight:
          type: number
        costPerPack:
          type: number
        brand:
          type: string
          nullable: true
        supplierPartNumber:
          type: string
          nullable: true
        supplierId:
          type: integer
          nullable: true
        secondarySupplierId:
          type: integer
          nullable: true
        orderingUrl:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        processingRatio:
          type: number
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - name
        - unit
        - packWeight
        - costPerPack
        - createdAt

    CreateIngredient:
      type: object
      properties:
        name:
          type: string
        unit:
          type: string
        packWeight:
          type: number
        costPerPack:
          type: number
        brand:
          type: string
          nullable: true
        supplierPartNumber:
          type: string
          nullable: true
        supplierId:
          type: integer
          nullable: true
        secondarySupplierId:
          type: integer
          nullable: true
        orderingUrl:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        processingRatio:
          type: number
          nullable: true
      required:
        - name
        - unit
        - packWeight
        - costPerPack

    SubRecipe:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        yield:
          type: number
        yieldUnit:
          type: string
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - name
        - yield
        - yieldUnit
        - createdAt

    SubRecipeIngredient:
      type: object
      properties:
        id:
          type: integer
        ingredientId:
          type: integer
        ingredientName:
          type: string
        unit:
          type: string
        quantity:
          type: number
        processingRatio:
          type: number
          nullable: true
      required:
        - id
        - ingredientId
        - ingredientName
        - unit
        - quantity

    SubRecipeDetail:
      allOf:
        - $ref: "#/components/schemas/SubRecipe"
        - type: object
          properties:
            ingredients:
              type: array
              items:
                $ref: "#/components/schemas/SubRecipeIngredient"
          required:
            - ingredients

    CreateSubRecipe:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        yield:
          type: number
        yieldUnit:
          type: string
        notes:
          type: string
          nullable: true
        ingredients:
          type: array
          items:
            type: object
            properties:
              ingredientId:
                type: integer
              quantity:
                type: number
            required:
              - ingredientId
              - quantity
      required:
        - name
        - yield
        - yieldUnit
        - ingredients

    Recipe:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        servings:
          type: number
        servingUnit:
          type: string
        category:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        packSize:
          type: number
        rrp:
          type: number
        packagingCost:
          type: number
        labourCost:
          type: number
        rawMaterialCostPerBatch:
          type: number
        costPerPortion:
          type: number
        packIngredientCost:
          type: number
        totalPackCost:
          type: number
        grossMargin:
          type: number
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - name
        - servings
        - servingUnit
        - packSize
        - rrp
        - packagingCost
        - labourCost
        - rawMaterialCostPerBatch
        - costPerPortion
        - packIngredientCost
        - totalPackCost
        - createdAt

    RecipeIngredient:
      type: object
      properties:
        id:
          type: integer
        ingredientId:
          type: integer
        ingredientName:
          type: string
        unit:
          type: string
        quantity:
          type: number
      required:
        - id
        - ingredientId
        - ingredientName
        - unit
        - quantity

    RecipeSubRecipe:
      type: object
      properties:
        id:
          type: integer
        subRecipeId:
          type: integer
        subRecipeName:
          type: string
        quantity:
          type: number
        unit:
          type: string
      required:
        - id
        - subRecipeId
        - subRecipeName
        - quantity
        - unit

    RecipeDetail:
      allOf:
        - $ref: "#/components/schemas/Recipe"
        - type: object
          properties:
