openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Food Production Planner API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: suppliers
    description: Supplier management
  - name: ingredients
    description: Ingredient management
  - name: recipes
    description: Recipe management
  - name: subRecipes
    description: Sub-recipe management
  - name: productionPlans
    description: Production plan management
  - name: stockEntries
    description: Stock management
  - name: salesEntries
    description: Sales data management
  - name: dispatchOrders
    description: Dispatch order management
  - name: users
    description: User management
  - name: categoryDefaults
    description: Category default cost management
  - name: dptSettings
    description: DPT (Daily Production Target) settings
  - name: timingStandards
    description: Timing standards by station
paths:
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AppUser"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUser"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppUser"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppUser"
    put:
      operationId: updateUser
      tags: [users]
      summary: Update a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUser"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppUser"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /suppliers:
    get:
      operationId: listSuppliers
      tags: [suppliers]
      summary: List all suppliers
      responses:
        "200":
          description: List of suppliers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Supplier"
    post:
      operationId: createSupplier
      tags: [suppliers]
      summary: Create a supplier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplier"
      responses:
        "201":
          description: Created supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"

  /suppliers/{id}:
    get:
      operationId: getSupplier
      tags: [suppliers]
      summary: Get supplier by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
    put:
      operationId: updateSupplier
      tags: [suppliers]
      summary: Update a supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplier"
      responses:
        "200":
          description: Updated supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
    delete:
      operationId: deleteSupplier
      tags: [suppliers]
      summary: Delete a supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /ingredients:
    get:
      operationId: listIngredients
      tags: [ingredients]
      summary: List all ingredients
      responses:
        "200":
          description: List of ingredients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ingredient"
    post:
      operationId: createIngredient
      tags: [ingredients]
      summary: Create an ingredient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIngredient"
      responses:
        "201":
          description: Created ingredient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ingredient"

  /ingredients/{id}:
    get:
      operationId: getIngredient
      tags: [ingredients]
      summary: Get ingredient by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ingredient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ingredient"
    put:
      operationId: updateIngredient
      tags: [ingredients]
      summary: Update an ingredient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIngredient"
      responses:
        "200":
          description: Updated ingredient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ingredient"
    delete:
      operationId: deleteIngredient
      tags: [ingredients]
      summary: Delete an ingredient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /sub-recipes:
    get:
      operationId: listSubRecipes
      tags: [subRecipes]
      summary: List all sub-recipes
      responses:
        "200":
          description: List of sub-recipes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubRecipe"
    post:
      operationId: createSubRecipe
      tags: [subRecipes]
      summary: Create a sub-recipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubRecipe"
      responses:
        "201":
          description: Created sub-recipe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubRecipe"

  /sub-recipes/{id}:
    get:
      operationId: getSubRecipe
      tags: [subRecipes]
      summary: Get sub-recipe by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sub-recipe with ingredients
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubRecipeDetail"
    put:
      operationId: updateSubRecipe
      tags: [subRecipes]
      summary: Update a sub-recipe
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubRecipe"
      responses:
        "200":
          description: Updated sub-recipe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubRecipe"
    delete:
      operationId: deleteSubRecipe
      tags: [subRecipes]
      summary: Delete a sub-recipe
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /recipes:
    get:
      operationId: listRecipes
      tags: [recipes]
      summary: List all recipes
      responses:
        "200":
          description: List of recipes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Recipe"
    post:
      operationId: createRecipe
      tags: [recipes]
      summary: Create a recipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRecipe"
      responses:
        "201":
          description: Created recipe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipe"

  /recipes/{id}:
    get:
      operationId: getRecipe
      tags: [recipes]
      summary: Get recipe by ID with full details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Recipe with full ingredient/sub-recipe breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecipeDetail"
    put:
      operationId: updateRecipe
      tags: [recipes]
      summary: Update a recipe
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRecipe"
      responses:
        "200":
          description: Updated recipe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipe"
    delete:
      operationId: deleteRecipe
      tags: [recipes]
      summary: Delete a recipe
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /production-plans:
    get:
      operationId: listProductionPlans
      tags: [productionPlans]
      summary: List production plans
      parameters:
        - name: date
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of production plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductionPlan"
    post:
      operationId: createProductionPlan
      tags: [productionPlans]
      summary: Create a production plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductionPlan"
      responses:
        "201":
          description: Created production plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductionPlan"

  /production-plans/{id}:
    get:
      operationId: getProductionPlan
      tags: [productionPlans]
      summary: Get production plan by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Production plan detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductionPlanDetail"
    put:
      operationId: updateProductionPlan
      tags: [productionPlans]
      summary: Update a production plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductionPlan"
      responses:
        "200":
          description: Updated production plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductionPlan"
    delete:
      operationId: deleteProductionPlan
      tags: [productionPlans]
      summary: Delete a production plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /production-plans/{id}/items/{itemId}:
    patch:
      operationId: updateProductionPlanItem
      tags: [productionPlans]
      summary: Update a single production plan item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                batchesComplete:
                  type: integer
                status:
                  type: string
                  enum: [pending, in-progress, complete]
                wonlyCount:
                  type: integer
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductionPlanItem"

  /production-plans/{id}/order:
    patch:
      operationId: updateProductionPlanOrder
      tags: [productionPlans]
      summary: Reorder production plan items
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                order:
                  type: array
                  items:
                    type: object
                    properties:
                      itemId:
                        type: integer
                      orderPosition:
                        type: integer
                    required:
                      - itemId
                      - orderPosition
              required:
                - order
      responses:
        "200":
          description: Order updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /production-plans/{id}/batch-completions:
    get:
      operationId: listBatchCompletions
      tags: [productionPlans]
      summary: List batch completions for a plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: stationType
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of batch completions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BatchCompletion"
    post:
      operationId: createBatchCompletion
      tags: [productionPlans]
      summary: Record a batch completion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                planItemId:
                  type: integer
                stationType:
                  type: string
                userId:
                  type: integer
                  nullable: true
                startedAt:
                  type: string
                  nullable: true
                completedAt:
                  type: string
                  nullable: true
              required:
                - planItemId
                - stationType
      responses:
        "201":
          description: Created batch completion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchCompletion"

  /production-plans/{id}/station-breaks:
    get:
      operationId: listStationBreaks
      tags: [productionPlans]
      summary: List station breaks for a plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: stationType
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of station breaks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StationBreak"
    post:
      operationId: createStationBreak
      tags: [productionPlans]
      summary: Record a station break
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                stationType:
                  type: string
                breakType:
                  type: string
                  nullable: true
                userId:
                  type: integer
                  nullable: true
                startedAt:
                  type: string
                  nullable: true
                endedAt:
                  type: string
                  nullable: true
              required:
                - stationType
      responses:
        "201":
          description: Created station break
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StationBreak"

  /production-plans/{id}/station-breaks/{breakId}:
    patch:
      operationId: endStationBreak
      tags: [productionPlans]
      summary: End a station break (set endedAt)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: breakId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                endedAt:
                  type: string
              required:
                - endedAt
      responses:
        "200":
          description: Updated station break
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StationBreak"
    delete:
      operationId: deleteStationBreak
      tags: [productionPlans]
      summary: Delete a station break
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: breakId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /production-plans/{id}/prep-requirements:
    get:
      operationId: getPrepRequirements
      tags: [productionPlans]
      summary: Get prep requirements for a plan filtered by ingredient category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: station
          in: query
          schema:
            type: string
          description: Filter by station (prep_veg, prep_bases, prep_meat, all)
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Prep requirements
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/PrepRequirementItem"
                  nextPlanDate:
                    type: string
                    nullable: true

  /dpt-calculator:
    get:
      operationId: getDptCalculator
      tags: [dptSettings]
      summary: Get DPT suggestions based on stock and dispatch demand
      parameters:
        - name: date
          in: query
          schema:
            type: string
          description: Plan date (YYYY-MM-DD) to calculate demand from
      responses:
        "200":
          description: DPT suggestions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DptSuggestion"

  /dpt-settings:
    get:
      operationId: listDptSettings
      tags: [dptSettings]
      summary: List all DPT settings
      responses:
        "200":
          description: List of DPT settings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DptSetting"
    post:
      operationId: createDptSetting
      tags: [dptSettings]
      summary: Create a DPT setting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDptSetting"
      responses:
        "201":
          description: Created DPT setting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DptSetting"

  /dpt-settings/{id}:
    put:
      operationId: updateDptSetting
      tags: [dptSettings]
      summary: Update a DPT setting
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDptSetting"
      responses:
        "200":
          description: Updated DPT setting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DptSetting"
    delete:
      operationId: deleteDptSetting
      tags: [dptSettings]
      summary: Delete a DPT setting
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dpt-settings/by-recipe/{recipeId}:
    put:
      operationId: upsertDptSettingByRecipe
      tags: [dptSettings]
      summary: Upsert a DPT setting by recipe ID
      parameters:
        - name: recipeId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDptSetting"
      responses:
        "200":
          description: Upserted DPT setting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DptSetting"

  /timing-standards:
    get:
      operationId: listTimingStandards
      tags: [timingStandards]
      summary: List all timing standards
      responses:
        "200":
          description: List of timing standards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimingStandard"
    post:
      operationId: createTimingStandard
      tags: [timingStandards]
      summary: Create a timing standard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTimingStandard"
      responses:
        "201":
          description: Created timing standard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimingStandard"

  /timing-standards/{id}:
    put:
      operationId: updateTimingStandard
      tags: [timingStandards]
      summary: Update a timing standard
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTimingStandard"
      responses:
        "200":
          description: Updated timing standard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimingStandard"
    delete:
      operationId: deleteTimingStandard
      tags: [timingStandards]
      summary: Delete a timing standard
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /stock-entries:
    get:
      operationId: listStockEntries
      tags: [stockEntries]
      summary: List stock entries
      responses:
        "200":
          description: List of stock entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockEntry"
    post:
      operationId: createStockEntry
      tags: [stockEntries]
      summary: Create or update a stock entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStockEntry"
      responses:
        "201":
          description: Created stock entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockEntry"

  /stock-entries/{id}:
    put:
      operationId: updateStockEntry
      tags: [stockEntries]
      summary: Update a stock entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStockEntry"
      responses:
        "200":
          description: Updated stock entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockEntry"
    delete:
      operationId: deleteStockEntry
      tags: [stockEntries]
      summary: Delete a stock entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /sales-entries:
    get:
      operationId: listSalesEntries
      tags: [salesEntries]
      summary: List sales entries
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of sales entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SalesEntry"
    post:
      operationId: createSalesEntry
      tags: [salesEntries]
