          type: number
          nullable: true
          description: Capacity of a raw meat tray in kg (used for tray count calculation)
        createdAt:
          type: string
      required:
        - id
        - name
        - unit
        - packWeight
        - costPerPack
        - createdAt

    CreateIngredient:
      type: object
      properties:
