    post:
      operationId: createSalesEntry
      tags: [salesEntries]
      summary: Create a sales entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSalesEntry"
      responses:
        "201":
          description: Created sales entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesEntry"

  /sales-entries/{id}:
    put:
      operationId: updateSalesEntry
      tags: [salesEntries]
      summary: Update a sales entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSalesEntry"
      responses:
