      operationId: listStockEntries
      tags: [stockEntries]
      summary: List stock entries
      responses:
        "200":
          description: List of stock entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockEntry"
    post:
      operationId: createStockEntry
      tags: [stockEntries]
      summary: Create or update a stock entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStockEntry"
      responses:
        "201":
          description: Created stock entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockEntry"

  /stock-entries/{id}:
    put:
      operationId: updateStockEntry
