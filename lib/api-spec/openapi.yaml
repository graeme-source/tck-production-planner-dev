  /dispatch-orders:
    get:
      operationId: listDispatchOrders
      tags: [dispatchOrders]
      summary: List dispatch orders
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of dispatch orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DispatchOrder"
    post:
      operationId: createDispatchOrder
      tags: [dispatchOrders]
      summary: Create a dispatch order
      requestBody:
        required: true
